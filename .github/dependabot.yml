# .github/dependabot.yml

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    # Roll all action bumps into a single PR to cut review noise.
    groups:
      github-actions:
        patterns:
          - "*"

  # Python dependencies
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    # Batch low-risk minor/patch bumps; let majors come as individual PRs.
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
